---
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPPeeringPolicy
metadata:
  name: bgp-loadbalancer-ip-main
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: "linux"
  virtualRouters:
    - localASN: 65401
      exportPodCIDR: false
      neighbors:
        - peerASN: 65401
          peerAddress: 10.1.33.1/32
      serviceSelector:
        matchExpressions:
          - {
              key: thisFakeSelector,
              operator: NotIn,
              values: ["will-match-and-announce-all-services"],
            }

---
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: main-pool
spec:
  cidrs:
    - cidr: 172.16.0.1/24
