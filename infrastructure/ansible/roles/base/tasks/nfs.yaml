- name: System Configuration | NFS
  copy:
    src: files/nfsmount.conf
    dest: /etc/nfsmount.conf
    owner: root
    group: root
    mode: "0644"

- name: Mount Docker NFS Share
  mount:
    src: "{{ docker_nfs_mounts.docker_volumes_nfs_mount }}"
    path: /mnt/docker-volumes
    fstype: nfs
    opts: "rw,sync,hard"
    state: mounted
