---
- hosts: all
  gather_facts: true
  become: true
  roles:
    - base

- hosts: kubernetes
  become: true
  gather_facts: true
  any_errors_fatal: true
  pre_tasks:
    - name: Pausing for 2 seconds...
      pause:
        seconds: 2
  roles:
    - k3s-prepare





