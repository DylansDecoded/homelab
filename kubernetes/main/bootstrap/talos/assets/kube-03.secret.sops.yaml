# Indicates the schema used to decode the contents.
version: v1alpha1
# Enable verbose logging to the console.
debug: false
persist: true
machine:
    # Defines the role of the machine within the cluster.
    type: controlplane
    token: ENC[AES256_GCM,data:8889pKVSPy8fQlZtpXTmQUOF5dbpNHw=,iv:l0qr9B8JVYUFVTp+OoWe8YsWPcfQYFY/jP5/MXZO51M=,tag:J+cGerpX3R0UMrmR7QYSXA==,type:str]
    ca:
        crt: ENC[AES256_GCM,data:,iv:IO7i0vCIHpGB9h9V5ri3xC2hzlnttVxTaJVxh/l8pig=,tag:k/wxm0tNp9B/VgYDbwh8Rw==,type:str]
        key: ENC[AES256_GCM,data:FOdJDuFSn3KMwqUK84REpMFQXbFwx857KCuSQCPhOBSoLnPX960IfnzYeXahTK2NyUiitRqKJTAnjedxbfujmC9KftYs4Xycl/gZThqskSb3f+buuu0W30FMlPea1QwKBuxqXMxPDuioWLrlBd+6f4sWbrYNN8FchciCuG93nBC02E/xqrzdvVyhbGLGVBpzhlGxz3cLw8cvkRHpNAUCSfwXUds2SWisfXHRBRPEOc0m1CWE,iv:iu38ZOBlrRfwoZTFUCadgZmzo9DPaFo+gGWOkEhSy+g=,tag:/FIYOp4iYANIdQTFMaj0Bw==,type:str]
    # Extra certificate subject alternative names for the machine's certificate.
    certSANs:
        - 127.0.0.1
        - 10.1.33.252
    # Used to provide additional options to the kubelet.
    kubelet:
        image: ghcr.io/siderolabs/kubelet:${KUBERNETES_VERSION}
        extraArgs: null
        rotate-server-certificates: "true"
        extraMounts:
            - destination: /var/openebs/local
              type: bind
              source: /var/openebs/local
              options:
                - bind
                - rshared
                - rw
        defaultRuntimeSeccompProfileEnabled: true
        nodeIP:
            validSubnets:
                - 10.1.33.0/24
        disableManifestsDirectory: true
    network:
        hostname: kube-03
        interfaces:
            - deviceSelector:
                hardwareAddr: ac:e2:d3:0d:60:f0
              mtu: 9000
              dhcp: true
              vip:
                ip: 10.1.33.252
                #       # wireguard:
                #       #     privateKey: ABCDEF... # Specifies a private key configuration (base64 encoded).
                #       #     # Specifies a list of peer configurations to apply to a device.
                #       #     peers:
                #       #         - publicKey: ABCDEF... # Specifies the public key of this peer.
                #       #           endpoint: 192.168.1.2:51822 # Specifies the endpoint of this peer entry.
                #       #           persistentKeepaliveInterval: 10s # Specifies the persistent keepalive interval for this peer.
                #       #           # AllowedIPs specifies a list of allowed IP addresses in CIDR notation for this peer.
                #       #           allowedIPs:
                #       #             - 192.168.1.0/24
    install:
        # The disk used for installations.
        disk: /dev/nvme0n1
        # Indicates if the installation disk should be wiped at installation time.
        wipe: false
        extraKernelArgs:
            - mitigations=off
        image: factory.talos.dev/installer/${TALOS_SCHEMATIC_ID}:${TALOS_VERSION}
        wipe: false
    files:
        - content: |-
            [plugins."io.containerd.grpc.v1.cri"]
              enable_unprivileged_ports = true
              enable_unprivileged_icmp = true
            [plugins."io.containerd.grpc.v1.cri".containerd]
              discard_unpacked_layers = false
            [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
              discard_unpacked_layers = false
          permissions: 0
          path: /etc/cri/conf.d/20-customization.part
          op: create
        - content: |-
            [ NFSMount_Global_Options ]
            nfsvers=4.2
            hard=True
            noatime=True
            nodiratime=True
            rsize=131072
            wsize=131072
            nconnect=8
          permissions: 420
          path: /etc/nfsmount.conf
          op: overwrite
sysctls:
    fs.inotify.max_queued_events: "65536"
    fs.inotify.max_user_instances: "8192"
    fs.inotify.max_user_watches: "524288"
    net.core.rmem_max: "2500000"
    net.core.wmem_max: "2500000"
features:
    rbac: true
    stableHostname: true
    kubernetesTalosAPIAccess:
        enabled: true
        allowedRoles:
            - os:admin
        allowedKubernetesNamespaces:
            - system-upgrade
    apidCheckExtKeyUsage: true
    diskQuotaSupport: true
    kubePrism:
        enabled: true
        port: 7445
    hostDNS:
        enabled: true
        resolveMemberNames: true
        forwardKubeDNSToHost: false
udev:
    rules:
        # Thunderbolt
        - ACTION=="add", SUBSYSTEM=="thunderbolt", ATTR{authorized}=="0", ATTR{authorized}="1"
        # Intel GPU
        - SUBSYSTEM=="drm", KERNEL=="renderD*", GROUP="44", MODE="0660"
        # Google Coral USB Accelerator
        - SUBSYSTEMS=="usb", ATTRS{idVendor}=="1a6e", ATTRS{idProduct}=="089a", GROUP="20", MODE="0660"
        - SUBSYSTEMS=="usb", ATTRS{idVendor}=="18d1", ATTRS{idProduct}=="9302", GROUP="20", MODE="0660"
nodeLabels:
    topology.kubernetes.io/region: main
    topology.kubernetes.io/zone: m
    # factory.talos.dev/schematic-id.part-0: ${TALOS_SCHEMATIC_ID:0:32}
    # factory.talos.dev/schematic-id.part-1: ${TALOS_SCHEMATIC_ID:32}
# Provides cluster specific configuration options.
cluster:
    # Globally unique identifier for this cluster (base64 encoded random 32 bytes).
    id: ENC[AES256_GCM,data:0C08meVN4fayqx6jNqYA3JiM50KxYDZW9e7PkX8L0BVgLi1ESpDEC7OXKJc=,iv:sfZUPff945GV//vEeGLo+gfCluEALvB8UVYZKInMlQk=,tag:fihinMvlIq5wZunYFEAF4A==,type:str]
    # Shared secret of cluster (base64 encoded random 32 bytes).
    secret: ENC[AES256_GCM,data:6UcMiZyCqgiaJcZvC756sdMzW0IuXDPWJsC9K65fjEYb/j5I43NrGYOlrzw=,iv:laZ1YW4dMvwCTpW8loearToljmUVrXLVYsijPBxG92g=,tag:LZSj2+zFEdljyIEwOdoIwA==,type:str]
    # Provides control plane specific configuration options.
    controlPlane:
        # Endpoint is the canonical controlplane endpoint, which can be an IP address or a DNS hostname.
        endpoint: https://10.1.33.252
    # Configures the cluster's name.
    clusterName: main
    # Provides cluster specific network configuration options.
    network:
        cni:
            name: none
        # The domain used by Kubernetes DNS.
        dnsDomain: cluster.local
        # The pod subnet CIDR.
        podSubnets:
            - 10.42.0.0/16
        # The service subnet CIDR.
        serviceSubnets:
            - 10.43.0.0/12
    coreDNS:
        disabled: true
    token: ENC[AES256_GCM,data:x8nS9Vf9G/oUWFTj2c6FzrrmqFcgG/I=,iv:6IRUK3yumaJrHDaujQ3bpF89ycA1TfFtM24YhFYoH0Y=,tag:KGDlpAbkZqJZXBi/TpNxlg==,type:str]
    secretboxEncryptionSecret: ENC[AES256_GCM,data:IA6Pb+77EgwkOqEOtJIh+JCUYK+txQp55j4jVOTUPsY/ech+LDW/l//dZVI=,iv:z+ZZYQymfugv+cVboP3H/eHw4r0M2lSC6R9+cKF8W3U=,tag:TZ+5j1dSbNwKvL1ocZUiCw==,type:str]
    ca:
        crt: ENC[AES256_GCM,data:,iv:J5A97vkiOYKjAXtZHWSmk9df33AKiBHJCc1HaT2UWMQ=,tag:Bf5fHJctecgYTCuIZtqyXw==,type:str]
        key: ENC[AES256_GCM,data:,iv:tbInyTH7ZqW5KpkDjINUQDJjAJSB2rwtX5kJiJGPWpI=,tag:ryV8jk8ntpF681rfs6UNKw==,type:str]
    # The base64 encoded aggregator certificate authority used by Kubernetes for front-proxy certificate generation.
    aggregatorCA:
        crt: ENC[AES256_GCM,data:,iv:yq79imUoexSW5LYb2pWC5LN6k4DIh43VkZDWx5OkVhE=,tag:eX8LrXTwK8adkZE/7Yk19g==,type:str]
        key: ENC[AES256_GCM,data:,iv:A4m/+2MDQhBfvKH0D389F0h2BuEGF2hHGsvuLPYxlzM=,tag:8PyNnj/5STlu67Uz8HKEFg==,type:str]
    # The base64 encoded private key for service account token generation.
    serviceAccount:
        key: ENC[AES256_GCM,data:,iv:OlOpBWuS+c/rHxnkzUR/Jw52PBpF3UU0A22y11p6hn4=,tag:rDxie3cgruzM96lKHIoACA==,type:str]
    # API server specific configuration options.
    apiServer:
        image: registry.k8s.io/kube-apiserver:${KUBERNETES_VERSION}
        # Extra certificate subject alternative names for the API server's certificate.
        certSANs:
            - 127.0.0.1
            - 10.1.33.252
        # Disable PodSecurityPolicy in the API server and default manifests.
        disablePodSecurityPolicy: true
        auditPolicy:
            apiVersion: audit.k8s.io/v1
            kind: Policy
            rules:
                - level: Metadata
    controllerManager:
        image: registry.k8s.io/kube-controller-manager:${KUBERNETES_VERSION}
        extraArgs:
            bind-address: 0.0.0.0
    proxy:
        disabled: true
        image: registry.k8s.io/kube-proxy:${KUBERNETES_VERSION}
    scheduler:
        image: registry.k8s.io/kube-scheduler:${KUBERNETES_VERSION}
        extraArgs:
            bind-address: 0.0.0.0
    discovery:
        enabled: true
        registries:
            kubernetes:
                disabled: false
            service:
                disabled: false
    etcd:
        # The `ca` is the root certificate authority of the PKI.
        ca:
            crt: ENC[AES256_GCM,data:,iv:qzGjzSBrcBigFkoM9MP/z9DEn9cS+DZJcOH0q97VtbI=,tag:YmkIZRskkdJTvKVMOh+jtg==,type:str]
            key: ENC[AES256_GCM,data:,iv:xOil9vHtdXjiMaLnt4fzsNaVBwT3W9Q+LgKeVvcDhz4=,tag:cwvf4WpAw+kvRz+kDGFdvg==,type:str]
        extraArgs:
            listen-metrics-urls: http://0.0.0.0:2381
        advertisedSubnets:
            - 10.1.33.0/24
        allowSchedulingOnMasters: true
