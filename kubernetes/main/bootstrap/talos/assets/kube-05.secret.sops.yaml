    id: ENC[AES256_GCM,data:XTPC+e3nnCeq/eMTWZ5d0vLEuVtMwEdIgrL+S3rBMtbKr1R/Q35t4DRbv70=,iv:/s07jo390/mTbZnLBAibj0/Y/iycyVzAMSO5v4ZBrYU=,tag:iZfdCZkIj5eEfj/nQssc1A==,type:str]
    # Shared secret of cluster (base64 encoded random 32 bytes).
    secret: ENC[AES256_GCM,data:u9DxjMELNDJ0xOovVd8+3wnDBnxEGqzGEdjNVu11Yfkn3KJV2relu9a1XZo=,iv:VcWlJ0DlZPv3nNCxwriVHWtouBgZtaA1LggagslZPuE=,tag:kLsD3+fdF/FyVhGD4NOKDw==,type:str]
    # Provides control plane specific configuration options.
    controlPlane:
        endpoint: https://10.1.33.252:6443
    # Provides cluster specific network configuration options.
    network:
        cni:
            name: none
        dnsDomain: cluster.local
    coreDNS:
        disabled: true
    token: ENC[AES256_GCM,data:NzD54EXjnwc3Z2AbhzWsKgkdyJ33aNQ=,iv:+/8CtR4W0sfR2F5M5wVT0vZhkSnDsoAYF4iN8z27AXk=,tag:aVDNFrFV62r6IzlwuWP3jA==,type:str]
    ca:
