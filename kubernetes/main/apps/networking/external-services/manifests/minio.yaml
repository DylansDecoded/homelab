---
apiVersion: v1
kind: Service
metadata:
  name: minio
spec:
  ports:
    - name: api
      protocol: TCP
      port: 9000
    - name: console
      protocol: TCP
      port: 9001

---
apiVersion: v1
kind: Endpoints
metadata:
  name: minio
subsets:
  - addresses:
      - ip: 10.1.30.200
    ports:
      - port:
          name: api
          protocol: TCP
          port: 9000
      - port:
          name: console
          protocol: TCP
          port: 9001
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio
spec:
  ingressClassName: internal
  rules:
    - host: &host s3.robsonhome.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  name: console

  tls:
    - hosts:
        - *host
