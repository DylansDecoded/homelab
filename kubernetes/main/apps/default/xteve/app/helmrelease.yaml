---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: xteve
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.0.4
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: volsync
      namespace: volsync-system
  values:
    controllers:
      xteve:
        containers:
          app:
            image:
              repository: ghcr.io/xm3u/xm3u
              tag: master@sha256:e2e57bf2d687a8e714a82950cafc33eb95063177443618d9cb4f96bc8e70bb95
            env:
              TZ: America/New_York
    pod:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: "OnRootMismatch"
        supplementalGroups:
          - 1000

    service:
      app:
        controller: xteve
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        annotations:
          io.cilium/lb-ipam-ips: 10.45.0.26
        ports:
          http:
            port: 34400

    ingress:
      app:
        className: internal
        hosts:
          - host: &host "xteve.robsonhome.cloud"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http

        tls:
          - hosts:
              - *host

    persistence:
      data:
        existingClaim: xteve
        globalMounts:
          - path: /data
