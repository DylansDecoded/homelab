---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./helmrelease.yaml
  - ./policy.yaml
  - ../../../../templates/volsync
configMapGenerator:
  - name: qbittorrent-dnsdist.conf
    files:
      - dnsdist.conf=./resources/dnsdist.conf
  - name: qbittorrent-scripts
    files:
      - completed.sh=./resources/completed.sh
generatorOptions:
  disableNameSuffixHash: true
