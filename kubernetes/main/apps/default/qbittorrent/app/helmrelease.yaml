---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: qbittorrent
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 2.5.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: volsync
      namespace: storage
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: ghcr.io/onedr0p/qbittorrent
              tag: 4.6.3@sha256:a4ad890e8c4a287c17d12ca22eb1d84a046aba2efbd882bf7d6eb12459f6a70c
            env:
              TZ: America/New_York
              QBITTORRENT__PORT: &port 8080
              # QBITTORRENT__BT_PORT: &bittorrentPort 58462
              QBITTORRENT__WebUI__AlternativeUIEnabled: false
              QBT_Preferences__WebUI__AuthSubnetWhitelistEnabled: true
              QBT_Preferences__WebUI__AuthSubnetWhitelist: >-
                10.1.1.0/24,
                10.1.10.0/24,
                10.1.20.0/24,
                10.1.33.0/24,
                10.1.40.0/24
            securityContext:
              runAsUser: 568
              runAsGroup: 568
            resources:
              requests:
                cpu: 200m
              limits:
                memory: 4Gi
          dnsdist:
            image:
              repository: docker.io/powerdns/dnsdist-18
              tag: 1.8.3
          gluetun:
            image:
              repository: ghcr.io/qmcgaw/gluetun
              tag: 3.35.0
            env:
              - name: VPN_SERVICE_PROVIDER
                value: custom
              - name: VPN_TYPE
                value: wireguard
              - name: VPN_PORT_FORWARDING
                value: on
              - name: DOT
                value: "off"
              - name: DNS_ADDRESS
                value: "127.0.0.2"
              - name: VPN_DNS_ADDRESSES
                value: "127.0.0.2"
              - name: FIREWALL_OUTBOUND_SUBNETS
                # Allow access to k3s subnets
                value: "10.42.0.0/16,10.43.0.0/16"
            envFrom:
              - secretRef:
                  name: gluetun-secret
            securityContext:
              capabilities:
                add:
                  - NET_ADMIN
        pod:
          securityContext:
            fsGroup: 568
            fsGroupChangePolicy: "OnRootMismatch"
            supplementalGroups:
              - 65539
    service:
      main:
        ports:
          http:
            port: *port
      # bittorrent:
      #   controller: main
      #   type: LoadBalancer
      #   annotations:
      #     io.cilium/lb-ipam-ips: 10.1.33.202
      # ports:
      #   bittorrent:
      #     enabled: true
      #     port: *bittorrentPort
      #     protocol: TCP
    ingress:
      main:
        enabled: true
        className: internal
        hosts:
          - host: &host qb.robsonhome.cloud
            paths:
              - path: /
                service:
                  name: main
                  port: http
        tls:
          - hosts:
              - *host
    persistence:
      config:
        enabled: true
        existingClaim: qbittorrent
      completed-script:
        type: configMap
        name: qbittorrent-scripts
        defaultMode: 0775
        globalMounts:
          - path: /scripts/completed.sh
            subPath: completed.sh
            readOnly: true
      media:
        type: nfs
        server: truenas.robsonhome.cloud
        path: /mnt/tank/nfs/media
        globalMounts:
          - path: /media
