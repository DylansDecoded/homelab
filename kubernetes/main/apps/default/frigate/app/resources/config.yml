---
logger:
  default: info

mqtt:
  host: mosquitto.default.svc.cluster.local
  topic_prefix: frigate
  user: "{FRIGATE_MQTT_USERNAME}"
  password: "{FRIGATE_MQTT_PASSWORD}"

database:
  path: /data/frigate.db

ffmpeg:
  global_args: -hide_banner -loglevel warning -threads 2

snapshots:
  enabled: true
  timestamp: false
  bounding_box: true
  retain:
    default: 2

record:
  enabled: true
  retain:
    days: 2
    mode: all
  events:
    retain:
      default: 2
      mode: active_objects

# objects:
#   track: ["person"]
#   filters:
#     person:
#       min_area: 5000
#       max_area: 100000
#       threshold: 0.7

go2rtc:
  streams:
    frigate_backporch_turret_cam:
      - ffmpeg:http://10.1.90.3/flv?port=1935&app=bcs&stream=channel0_main.bcs&user={FRIGATE_CAMERA_USER}&password={FRIGATE_CAMERA_PASSWORD}#video=copy#audio=copy#audio=opus

    frigate_backporch_turret_cam_sub:
      - ffmpeg:http://10.1.90.3/flv?port=1935&app=bcs&stream=channel0_ext.bcs&user={FRIGATE_CAMERA_USER}&password={FRIGATE_CAMERA_PASSWORD}

    frigate_driveway_floodlight_cam:
      - ffmpeg:http://10.1.90.4/flv?port=1935&app=bcs&stream=channel0_main.bcs&user={FRIGATE_CAMERA_USER}&password={FRIGATE_CAMERA_PASSWORD}#video=copy#audio=copy#audio=opus

    frigate_driveway_floodlight_cam_sub:
      - ffmpeg:http://10.1.90.4/flv?port=1935&app=bcs&stream=channel0_ext.bcs&user={FRIGATE_CAMERA_USER}&password={FRIGATE_CAMERA_PASSWORD}

cameras:
  frigate_driveway_floodlight_cam:
    ffmpeg:
      inputs:
        - path: rtsp://localhost:8554/frigate_driveway_floodlight_cam?video=copy&audio=aac
          input_args: preset-rtsp-restream
          roles: ["record"]
        - path: rtsp://localhost:8554/frigate_driveway_floodlight_cam_sub?video=copy
          input_args: preset-rtsp-restream
          roles: ["detect"]

  frigate_backporch_turret_cam:
    ffmpeg:
      inputs:
        - path: rtsp://localhost:8554/frigate_backporch_turret_cam?video=copy&audio=aac
          input_args: preset-rtsp-restream
          roles: ["record"]
        - path: rtsp://localhost:8554/frigate_backporch_turret_cam_sub?video=copy
          input_args: preset-rtsp-restream
          roles: ["detect"]
