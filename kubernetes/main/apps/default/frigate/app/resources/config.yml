---
logger:
  default: info
  # logs:
  #   frigate.record: debug

mqtt:
  host: mosquitto.default.svc.cluster.local
  topic_prefix: frigate
  user: "{FRIGATE_MQTT_USERNAME}"
  password: "{FRIGATE_MQTT_PASSWORD}"

database:
  path: /data/frigate.db

# detectors:
#   coral:
#     type: edgetpu
#     device: usb

ffmpeg:
  global_args: -hide_banner -loglevel warning -threads 2
  hwaccel_args:
    [
      "-hwaccel",
      "vaapi",
      "-hwaccel_device",
      "/dev/dri/renderD128",
      "-hwaccel_output_format",
      "yuv420p",
    ]
  output_args: preset-

snapshots:
  enabled: true
  timestamp: false
  bounding_box: true
  retain:
    default: 2

record:
  enabled: true
  retain:
    days: 2
    mode: all
  events:
    retain:
      default: 2
      mode: active_objects

# objects:
#   track: ["person"]
#   filters:
#     person:
#       min_area: 5000
#       max_area: 100000
#       threshold: 0.7

go2rtc:
  streams:
    frigate_driveway_floodlight_cam:
      - "ffmpeg:http://10.1.90.4/flv?port=1935&app=bcs&stream=channel0_main.bcs&user=admin&password={REOLINK_PASSWORD}#video=copy#audio=copy#audio=opus"

    frigate_driveway_floodlight_cam_sub:
      - "ffmpeg:http://10.1.90.4/flv?port=1935&app=bcs&stream=channel0_ext.bcs&user=admin&password={REOLINK_PASSWORD}"

    frigate_backporch_turret_cam:
      - "ffmpeg:http://10.1.90.3/flv?port=1935&app=bcs&stream=channel0_main.bcs&user=admin&password={REOLINK_PASSWORD}#video=copy#audio=copy#audio=opus"

    frigate_backporch_turret_cam_sub:
      - "ffmpeg:http://10.1.90.3/flv?port=1935&app=bcs&stream=channel0_ext.bcs&user=admin&password={REOLINK_PASSWORD}"

cameras:
  frigate_driveway_floodlight_cam:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/frigate_driveway_floodlight_cam?video=copy&audio=aac
          input_args: preset-rtsp-restream
          roles: ["record"]
        - path: rtsp://127.0.0.1:8554/frigate_driveway_floodlight_cam_sub?video=copy
          input_args: preset-rtsp-restream
          roles: ["detect"]
  frigate_backporch_turret_cam:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/frigate_backporch_turret_cam?video=copy&audio=aac
          input_args: preset-rtsp-restream
          roles: ["record"]
        - path: rtsp://127.0.0.1:8554/frigate_backporch_turret_cam_sub?video=copy
          input_args: preset-rtsp-restream
          roles: ["detect"]
