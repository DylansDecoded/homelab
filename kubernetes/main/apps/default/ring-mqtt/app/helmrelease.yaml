---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: &app ring-mqtt
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 2.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  dependsOn:
    - name: mosquitto
      namespace: default
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: volsync
      namespace: volsync-system
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: docker.io/tsightler/ring-mqtt
              tag: 5.6.3
            env:
              MQTTHOST: "mosquitto.default.svc.cluster.local"
              ENABLECAMERAS: "true"
              SNAPSHOTMODE: "true"
              ENABLEPANIC: "true"
              MQTTPORT: 1883
              DEBUG: "ring-mqtt"
            envFrom:
              - secretRef:
                  name: ring-mqtt-secret
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
            securityContext:
              privileged: true
    service:
      main:
        ports:
          http:
            port: 8554
    persistence:
      data:
        enabled: true
        existingClaim: ring-mqtt
        globalMounts:
          - path: /data
      config:
        type: configMap
        name: ring-mqtt-config
        globalMounts:
          - path: /data/config.json
            subPath: config.json

      # config:
      #   type: configMap
      #   name: ring-mqtt-config
      #   globalMounts:
      #     - path: /data/config.json
      #       subPath: config.json
