---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mosquitto
  namespace: home-automation
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: mosquitto-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        mosquitto_pwd: |
          {{ .mosquitto_username }}:{{ .mosquitto_password }}
          {{ .mosquitto_zigbee2mqtt_username }}:{{ .mosquitto_zigbee2mqtt_password }}
          {{ .mosquitto_homeassistant_username }}:{{ .mosquitto_homeassistant_password }}
          {{ .mosquitto_zwave_username }}:{{ .mosquitto_zwave_password }}
  dataFrom:
    - extract:
        key: mosquitto
