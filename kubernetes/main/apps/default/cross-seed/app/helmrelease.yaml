values:
  controllers:
    cross-seed:
      annotations:
        confimap.reloader.stakater.com/reload: cross-seed-configmap
        secret.reloader.stakater.com/reload: cross-seed-secret

      pod:
        securityContext:
          runAsUser: 568
          runAsGroup: 568
          runAsNonRoot: true
          fsGroup: 568
          fsGroupChangePolicy: "OnRootMismatch"

      containers:
        app:
          image:
            repository: ghcr.io/cross-seed/cross-seed
            tag: 5.9.2
          args:
            - daemon
          env:
            CROSSSEED_PORT: &port 2468
          envFrom:
            - secretRef:
                name: cross-seed-secret
          probes:
            liveness:
              enabled: true
            readiness:
              enabled: true
            startup:
              enabled: true
              spec:
                failureThreshold: 30
                periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

  service:
    app:
      controller: cross-seed
      ports:
        http:
          port: *port

  persistence:
    config:
      type: emptyDir
    config-file:
      type: configMap
      name: cross-seed-configmap
      globalMounts:
        - path: /config/config.js
          subPath: config.js
          readOnly: true
    qbittorrent:
      existingClaim: qbittorrent-config
      globalMounts:
        - path: /qbittorrent
