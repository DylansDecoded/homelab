---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: &app node-red
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.0.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      node-red:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/nodered/node-red
              tag: 3.1.7@sha256:b3bee638741091bf6548f77aa08ec9ff5f879cdf6a0a43c761dcd009217636a5
            env:
              TZ: America/New_York
              NODE_RED_OAUTH_ISSUER_URL: https://auth.robsonhome.cloud
              NODE_RED_OAUTH_AUTH_URL: https://auth.robsonhome.cloud/api/oidc/authorization
              NODE_RED_OAUTH_CALLBACK_URL: https://nr.robsonhome.cloud/auth/strategy/callback
              NODE_RED_OAUTH_TOKEN_URL: https://auth.robsonhome.cloud/api/oidc/token
              NODE_RED_OAUTH_USER_URL: https://auth.robsonhome.cloud/api/oidc/userinfo
            envFrom:
              - secretRef:
                  name: node-red-secret
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 1880

    ingress:
      app:
        enabled: true
        className: internal
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/description: Home Automation
          gethomepage.dev/group: selfhosted
          gethomepage.dev/icon: si-node-red
          gethomepage.dev/name: node-red
        hosts:
          - host: &host "{{ .Release.Name }}.robsonhome.cloud"
            paths: &paths
              - path: /
                service:
                  name: main
                  port: http
          - host: &customHost nr.robsonhome.cloud
            paths: *paths
        tls:
          - hosts:
              - *host
              - *customHost
    persistence:
      data:
        enabled: true
        existingClaim: node-red
        advancedMounts:
          node-red:
            app:
              - path: /data
      settings:
        type: configMap
        name: node-red-configmap
        advancedMounts:
          node-red:
            app:
              - path: /resources/settings.js
                subPath: settings.js
                readOnly: true
