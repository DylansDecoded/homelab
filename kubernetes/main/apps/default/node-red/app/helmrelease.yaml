---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: &app node-red
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 2.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: docker.io/nodered/node-red
              tag: 3.1.5@sha256:924ad08270bb8de2646586cbf65bd9d1aaad8f17576e216f076efaa52c5b17ce
            env:
              TZ: America/New_York
              NODE_RED_OAUTH_ISSUER_URL: https://auth.robsonhome.cloud
              NODE_RED_OAUTH_AUTH_URL: https://auth.robsonhome.cloud/api/oidc/authorization
              NODE_RED_OAUTH_CALLBACK_URL: https://nr.robsonhome.cloud/auth/strategy/callback
              NODE_RED_OAUTH_TOKEN_URL: https://auth.robsonhome.cloud/api/oidc/token
              NODE_RED_OAUTH_USER_URL: https://auth.robsonhome.cloud/api/oidc/userinfo
            envFrom:
              - secretRef:
                  name: node-red-secret
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
    ingress:
      main:
        enabled: true
        className: internal
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: "selfhosted"
          gethomepage.dev/icon: si-nodered
        hosts:
          - host: &host nr.robsonhome.cloud"
            paths:
              - path: /
                service:
                  name: main
                  port: http
        tls:
          - hosts:
              - *host
    persistence:
      data:
        enabled: true
        existingClaim: node-red
        globalMounts:
          - path: /data
      settings:
        type: configMap
        name: node-red-configmap
        globalMounts:
          - path: /resources/settings.js
            subPath: settings.js
            readOnly: true
