---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: &app node-red
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 2.3.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
    - name: volsync
      namespace: storage
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsUser: "1000"
            runAsGroup: "1000"
            fsGroup: "1000"
            fsGroupChangePolicy: "OnRootMismatch"

        containers:
          main:
            image:
              repository: docker.io/nodered/node-red
              tag: 3.1.1
            env:
              TZ: America/New_York
              NODE_RED_OAUTH_ISSUER_URL: https://auth.robsonhome.cloud
              NODE_RED_OAUTH_AUTH_URL: https://auth.robsonhome.cloud/api/oidc/authorization
              NODE_RED_OAUTH_CALLBACK_URL: https://nr.robsonhome.cloud/auth/strategy/callback
              NODE_RED_OAUTH_TOKEN_URL: http://authelia.default.svc.cluster.local:9091/api/oidc/token
              NODE_RED_OAUTH_USER_URL: http://authelia.default.svc.cluster.local:9091/api/oidc/userinfo

            envFrom:
              - secretRef:
                  name: node-red-secret

            resources:
              requests:
                cpu: 5m
                memory: 36M
              limits:
                memory: 512M
    service:
      main:
        ports:
          http:
            port: 1880
    ingress:
      main:
        enabled: true
        className: internal
        hosts:
          - host: &host "nr.robsonhome.cloud"
            paths:
              - path: /
                service:
                  name: main
                  port: http
        tls:
          - hosts:
              - *host

    persistence:
      data:
        enabled: true
        existingClaim: node-red
        advancedMounts:
          main:
            main:
              - path: /data

      config-file:
        type: configMap
        name: node-red-configmap
        globalMounts:
          - path: /data/settings.js
            subPath: settings.js
            readOnly: true
