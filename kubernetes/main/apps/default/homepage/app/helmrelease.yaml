# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/helm.toolkit.fluxcd.io/helmrelease_v2beta2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: homepage
spec:
  releaseName: homepage
  interval: 30m
  maxHistory: 3
  chart:
    spec:
      chart: homepage
      version: 1.2.3
      sourceRef:
        kind: HelmRepository
        name: jameswynn
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/gethomepage/homepage
      tag: v0.8.8
    enableRbac: true
    podAnnotations:
      reloader.stakater.com/auto: "true"
    serviceAccount:
      create: true
    ingress:
      main:
        ingressClassName: internal
        enabled: true
        hosts:
          - host: &host homepage.robsonhome.cloud
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - *host
    envFrom:
      - secretRef: # yamllint disable-line
          name: homepage-secret
    resources:
      requests:
        cpu: 10m
        memory: 100Mi
      limits:
        memory: 200Mi
    config:
      kubernetes:
        mode: cluster
      settings:
        title: K3S Cluster Homepage
        startUrl: https://homepage.robsonhome.cloud/
        theme: dark

        cardBlur: sm
        disableCollapse: true
        statusStyle: dot
        headerStyle: clean
        iconStyle: theme

        layout:
          media:
            header: false
            columns: 3
            style: row
            useEqualHeights: true
          selfhosted:
            header: false
            columns: 4
            style: row
          downloads:
            header: false
            columns: 4
            style: row
            useEqualHeights: true
          monitoring:
            header: false
            columns: 4
            style: row
            useEqualHeights: true
          # nas:
          #   header: false
          #   columns: 1
          #   style: row
          #   useEqualHeights: true
          # network:
          #   header: false
          #   columns: 1
          #   style: row
          #   useEqualHeights: true
          # security:
      services:
        - network:
            # - pfsense:
            #     href: https://pfs.robsonhome.cloud
            #     icon: pfsense.png
            #     widget:
            #       type: pfsense
            #       url: "https://pfs.robsonhome.cloud"
            #       key: "{{ PFSENSE_API_KEY }}"

            - pi-hole:
                href: http://ns1.robsonhome.cloud/admin/
                icon: pi-hole.png
                widget:
                  type: pihole
                  url: "http://ns1.robsonhome.cloud:3001"
                  key: "{{ HOMEPAGE_PIHOLE_API_KEY }}"
        - truenas:
            - portal:
                href: https://truenas.robsonhome.cloud
                icon: truenas.png
                widget:
                  type: truenas
                  url: "https://truenas.robsonhome.cloud"
                  key: "{{ HOMEPAGE_TRUENAS_API_KEY }}"

      widgets:
        - kubernetes:
            cluster:
              show: true
              cpu: true
              memory: true
              showLabel: true
              label: "K3S Cluster"
            nodes:
              show: true
              cpu: true
              memory: true
              showLabel: true

      bookmarks:
        - homelab:
            - cloudflare:
                - abbr: cf
                  href: https://dash.cloudflare.com
        - dev:
            - kubesearch:
                - abbr: ks
                  href: https://kubesearch.dev/
            - github:
                - abbr: gh
                  href: https://github.com/
        - social:
            - facebook:
                - abbr: fb
                  href: https://facebook.com/
            - reddit:
                - abbr: rdt
                  href: https://reddit.com/
