---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: hajimari
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: hajimari
      version: 2.0.2
      sourceRef:
        kind: HelmRepository
        name: hajimari
        namespace: flux-system
      interval: 15m
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controller:
      replicas: 1
      strategy: RollingUpdate
    env:
      TZ: "UTC"
    hajimari:
      title: The Lab
      lightTheme: tron
      darkTheme: tron
      alwaysTargetBlank: true
      showGreeting: true
      showAppGroups: true
      showAppStatus: true
      showBookmarkGroups: false
      showGlobalBookmarks: false
      showAppUrls: false
      showAppInfo: true
      defaultEnable: true
      defaultAppIcon: mdi:application
      defaultSearchProvider: Searx
      namespaceSelector:
        matchNames:
          - longhorn-system
          - default
          - home-automation
          - networking
          - kube-system
      customApps:
        - name:
          url: "https://gitops.robsonhome.cloud"
          icon: mdi-flask
        - name: PFSense
          url: "https://pfsense.robsonhome.cloud"
          icon: simple-icons:pfsense
        - name: Minio
          url: "https://minio.robsonhome.cloud"
          icon: simple-icons:minio
        - name: hubble
          url: "https://hubble.robsonhome.cloud"
          icon: simple-icons:cilium
      globalBookmarks:
        - group: Dev
          bookmarks:
            - name: GitHub
              url: "https://github.com"
              icon: mdi:github
        - group: Cloud
          bookmarks:
            - name: ProtonMail
              url: "https://proton.me"
              icon: cib:protonmail
            - name: Bitwarden
              url: "https://vault.bitwarden.com"
              icon: simple-icons:bitwarden
            - name: Cloudflare
              url: "https://dash.cloudflare.com"
              icon: cib:cloudflare
        - group: Kubernetes
          bookmarks:
            - name: DylansDecoded/home-cluster
              url: "https://github.com/DylansDecoded/homelab-ops"
              icon: mdi:github
            - name: DylansDecoded/containers
              url: "https://github.com/DylansDecoded/containers"
              icon: mdi:github
            - name: k8s-at-home-search
              url: "https://whazor.github.io/k8s-at-home-search/"
              icon: mdi:search-web
        - group: Shopping
          bookmarks:
            - name: "Amazon (US)"
              url: "https://amazon.com/"
              icon: cib:amazon
            - name: "Amazon Business (US)"
              url: "https://business.amazon.com/"
              icon: arcticons:amazon-business
      searchProviders:
        - name: Google
          token: g
          icon: simple-icons:google
          searchUrl: https://www.google.com/search?q={query}
          url: https://www.google.com
        - name: DuckDuckGo
          token: d
          icon: simple-icons:duckduckgo
          searchUrl: https://duckduckgo.com/?q={query}
          url: https://duckduckgo.com
        - name: IMDB
          token: i
          icon: simple-icons:imdb
          searchUrl: https://www.imdb.com/find?q={query}
          url: https://www.imdb.com
        - name: Reddit
          token: r
          icon: simple-icons:reddit
          searchUrl: https://www.reddit.com/search?q={query}
          url: https://www.reddit.com
        - name: YouTube
          token: "y"
          icon: simple-icons:youtube
          searchUrl: https://www.youtube.com/results?search_query={query}
          url: https://www.youtube.com
        - name: Spotify
          token: s
          icon: simple-icons:spotify
          searchUrl: hhttps://open.spotify.com/search/{query}
          url: https://open.spotify.com

    ingress:
      main:
        enabled: true
        ingressClassName: internal
        annotations:
          hajimari.io/enable: "false"
        hosts:
          - host: &host hajimari.robsonhome.cloud
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - *host

    persistence:
      data:
        enabled: true
        accessModes:
          - ReadWriteOnce
        size: 1Gi
        storageClass: longhorn

    resources:
      requests:
        cpu: 15m
        memory: 64M
      limits:
        memory: 64M
