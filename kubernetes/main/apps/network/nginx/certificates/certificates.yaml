---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: robsonhome-cloud
spec:
  secretName: robsonhome-cloud-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: "*.lab.robsonhome.cloud"
  dnsNames:
    - "lab.robsonhome.cloud"
    - "*.lab.robsonhome.cloud"
