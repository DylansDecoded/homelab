---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tailscale
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: tailscale-secret
    creationPolicy: Owner
  data:
    TS_AUTH_KEY: "{{ .TS_AUTH_KEY }}"
  dataFrom:
    - extract:
        key: tailscale
