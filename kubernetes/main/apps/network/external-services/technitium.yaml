---
apiVersion: v1
kind: Service
metadata:
  name: technitium
  namespace: network
spec:
  ports:
    - protocol: TCP
      port: 80
---
apiVersion: v1
kind: Endpoints
metadata:
  name: technitium
  namespace: network
subsets:
  - addresses:
      - ip: 10.1.30.43
    ports:
      - port: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: technitium
  namespace: network
  annotations:
    # nginx.ingress.kubernetes.io/backend-protocol: 'HTTPS'
    nginx.ingress.kubernetes.io/proxy-set-headers: 'X-Real-IP $remote_addr;'
spec:
  ingressClassName: internal
  rules:
    - host: &host ns1.robsonhome.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: technitium
                port:
                  number: 80
  tls:
    - hosts: [*host]
