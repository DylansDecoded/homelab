---
apiVersion: v1
kind: Service
metadata:
  name: omada-controller
  namespace: network
spec:
  ports:
    - protocol: TCP
      port: 8043
---
apiVersion: v1
kind: Endpoints
metadata:
  name: omada-controller
  namespace: network
subsets:
  - addresses:
      - ip: 10.1.10.200
    ports:
      - port: 8043
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omada
  namespace: network
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/upstream-vhost: "omada.robsonhome.cloud:80"
    nginx.ingress.kubernetes.io/proxy-redirect-from: "~https://(.+):80/(.+)/login$"
    nginx.ingress.kubernetes.io/proxy-redirect-to: "https://$1/$2/login"
spec:
  ingressClassName: internal
  rules:
    - host: &host omada.robsonhome.cloud
      http:
        paths:
          - path: /login
            pathType: Prefix
            backend:
              service:
                name: omada-controller
                port:
                  number: 8043
  tls:
    - hosts: [*host]