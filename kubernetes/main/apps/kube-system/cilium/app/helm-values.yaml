bgpControlPlane:
  enabled: true
autoDirectNodeRoutes: true
bandwidthManager:
  enabled: true
  bbr: true
bgp:
  enabled: false
  announce:
    loadbalancerIP: true
    podCIDR: false
bpf:
  masquerade: true
cgroup:
  automount:
    enabled: false
  hostRoot: /sys/fs/cgroup
cluster:
  id: 1
  name: kubernetes
containerRuntime:
  integration: containerd
devices: mainif
enableRuntimeDeviceDetection: true
endpointRoutes:
  enabled: true
enableCiliumEndpointSlice: true
ipam:
  mode: kubernetes

ingressController:
  enabled: false
  loadbalancerMode: shared

ipv4NativeRoutingCIDR: 10.42.0.0/16
k8sServiceHost: 127.0.0.1
k8sServicePort: 7445
kubeProxyReplacement: true
kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256
l2announcements:
  enabled: true
gatewayAPI:
  enabled: true
loadBalancer:
  algorithm: maglev
  mode: dsr
  l7:
    backend: envoy
envoy:
  enabled: true
l7Proxy: true
localRedirectPolicy: true
rollOutCiliumPods: true
routingMode: native
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
