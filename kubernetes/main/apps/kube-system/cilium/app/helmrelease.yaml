---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  chart:
    spec:
      chart: cilium
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
      version: 1.15.0

  interval: 30m
  maxHistory: 2
  install:
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    bgpControlPlane:
      enabled: true

    bgp:
      enabled: false
      announce:
        loadbalancerIP: true
        podCIDR: false

    cluster:
      id: 1
      name: kubernetes

    containerRuntime:
      integration: containerd
      socketPath: /var/run/k3s/containerd/containerd.sock

    endpointStatus:
      enabled: true
      status: "policy"

    # ingressController:
    #   enabled: false
    #   loadBalancerMode: shared

    endpointRoutes:
      enabled: true

    enableCiliumEndpointSlice: true

    # nodePort:
    #   enabled: true

    bandwidthManager:
      enabled: true
      bbr: true

    bpf:
      masquerade: true
      # tproxy: true

    hubble:
      enabled: true
      metrics:
        enabled:
          - dns:query;ignoreAAAA
          - drop
          - tcp
          - flow
          - port-distribution
          - icmp
          - http

      relay:
        enabled: true
        rollOutPods: true

      serviceMonitor:
        enabled: false

      dashboards:
        enabled: true
        annotations:
          grafana_folder: Cilium
      ui:
        enabled: true
        ingress:
          enabled: true
          className: internal
          hosts:
            - &host hubble.robsonhome.cloud
          tls:
            - hosts:
                - *host

      l7Proxy: true

      nodePort:
        enabled: true

      devices: mainif

      loadBalancer:
        algorithm: maglev
        mode: dsr

      ipam:
        mode: "kubernetes"

      autoDirectNodeRoutes: true

      routingMode: native

      ipv4NativeRoutingCIDR: 10.42.0.0/16

      k8sServiceHost: 127.0.0.1

      k8sServicePort: 6444

      kubeProxyReplacement: true

      kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256

      localRedirectPolicy: true

      rollOutCiliumPods:
        enabled: true

      operator:
        rollOutPods: true
        prometheus:
          enabled: true
          serviceMonitor:
            enabled: true

      prometheus:
        enabled: true
        serviceMonitor:
          enabled: true

      securityContext:
        privileged: true
        capabilities:
          ciliumAgent:
            - PERFMON
            - BPF
            - CHOWN
            - KILL
            - NET_ADMIN
            - NET_RAW
            - IPC_LOCK
            - SYS_ADMIN
            - SYS_RESOURCE
            - DAC_OVERRIDE
            - FOWNER
            - SETGID
            - SETUI
          cleanCiliumState:
            - NET_ADMIN
            - SYS_ADMIN
            - SYS_RESOURCE
      cgroup:
        autoMount:
          enabled: false
        hostRoot: /sys/fs/cgroup
