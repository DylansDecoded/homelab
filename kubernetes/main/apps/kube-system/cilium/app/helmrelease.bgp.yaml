---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cilium
spec:
  interval: 30m
  chart:
    spec:
      chart: cilium
      version: 1.15.0
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    cluster:
      name: kubernetes
      id: 1
    cni:
      exclusive: false
    bgp:
      enabled: false
      announce:
        loadBalancerIP: true
        podCIDR: false
    bgpControlPlane:
      enabled: true
    k8sServiceHost: 127.0.0.1
    k8sServicePort: 6444
    rollOutCiliumPods: true
    localRedirectPolicy: true
    kubeProxyReplacement: strict
    kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256
    loadBalancer:
      algorithm: maglev
      mode: dsr
    bandwidthManager:
      enabled: true
      bbr: true
    bpf:
      masquerade: true
      tproxy: true
    l7Proxy: true
    enableCnpStatusUpdates: true
    endpointStatus:
      enabled: true
      status: "policy"
    ipam:
      mode: "kubernetes"
    ingressController:
      enabled: false
      loadbalancerMode: shared

    operator:
      rollOutPods: true

    autoDirectNodeRoutes: true
    ipv4NativeRoutingCIDR: 10.32.0.0/16
    routingMode: native
    containerRuntime:
      integration: containerd
      socketPath: /var/run/k3s/containerd/containerd.sock
    hubble:
      enabled: true
      metrics:
        enabled:
          - dns:query;ignoreAAAA
          - drop
          - tcp
          - flow
          - port-distribution
          - icmp
          - http

      relay:
        enabled: true
        rollOutPods: true

      ui:
        enabled: true
        rollOutPods: true
        ingress:
          enabled: true
          className: internal
          hosts:
            - &host hubble.robsonhome.cloud
          tls:
            - hosts:
                - *host
      prometheus:
        serviceMonitor:
          enabled: true
      operator:
        prometheus:
          serviceMonitor:
            enabled: true
    securityContext:
      privileged: true
      capabilities:
        ciliumAgent:
          - PERFMON
          - BPF
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUI
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE

    cgroup:
      autoMount:
        enabled: true
      hostRoot: /sys/fs/cgroup
