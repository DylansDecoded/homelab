---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fstrim
spec:
  chart:
    spec:
      chart: app-template
      version: 3.1.0
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  interval: 30m
  values:
    controllers:
      fstrim:
        type: cronjob

        cronjob:
          schedule: '0 0 * * 1'
          parallelism: 6 # Set this to your number of nodes

        pod:
          hostNetwork: true
          hostPID: true
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: fstrim

        containers:
          app:
            image:
              repository: docker.io/library/alpine
              tag: 3.19
            command:
              - '/bin/sh'
              - '-c'
            args:
              - |
                set -e
                #!/usr/bin/env bash

                KUBELET_BIN="/var/lib/kubelet"
                KUBELET_PID="$(pgrep -f $KUBELET_BIN)"

                echo "KUBELET_PID: ${KUBELET_PID}"

                if [ -z "${KUBELET_PID}" ]; then
                    echo "kubelet not found"
                    exit 1
                fi

                # Enter namespaces and run commands
                nsrun() {
                    nsenter \
                        --mount="/host/proc/${KUBELET_PID}/ns/mnt" \
                        --net="/host/proc/${KUBELET_PID}/ns/net" \
                        -- bash -c "$1"
                }

                # Trim filesystems
                nsrun "fstrim --verbose --quiet-unsupported --all"
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 128Mi
            securityContext:
              privileged: true

    persistence:
      procfs:
        type: hostPath
        hostPath: /proc
        hostPathType: Directory
        globalMounts:
          - path: /host/proc
            readOnly: true
      netfs:
        type: hostPath
        hostPath: /sys
        hostPathType: Directory
        globalMounts:
          - path: /host/net
            readOnly: true
