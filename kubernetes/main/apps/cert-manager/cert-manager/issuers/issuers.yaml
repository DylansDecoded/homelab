apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@robsonhome.cloud
    privateKeySecretRef:
      name: letsencrypt-production
    solvers:
      - dns01:
          cloudflare:
            email: dylan@robsonhome.cloud
            apiTokenSecretRef:
              name: cloudflare-secret
              key: api-token
        selector:
          dnsZones:
            - robsonhome.cloud
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@robsonhome.cloud
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - dns01:
          cloudflare:
            email: dylan@robsonhome.cloud
            apiTokenSecretRef:
              name: cloudflare-secret
              key: api-token
        selector:
          dnsZones:
            - robsonhome.cloud
