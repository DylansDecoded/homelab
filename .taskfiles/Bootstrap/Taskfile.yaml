---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  main:
    vars: &vars
      cluster: main
      cephnodes: k3s-01 k3s-02 k3s-03 k3s-04 k3s-05 k3s-06
      cephdisk: /dev/sda
    cmds:
      - task: :talos:bootstrap
        vars: *vars
      - task: :rook:reset
        vars: *vars
      - task: :flux:bootstrap
        vars: *vars
    preconditions:
      - test -f {{.KUBERNETES_DIR}}/{{.cluster}}/talosconfig
      - talosctl --context {{.cluster}} config info >/dev/null 2>&1

