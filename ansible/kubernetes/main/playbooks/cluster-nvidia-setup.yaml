---
- name: Prepare nvidia gpu node
  hosts: gpu_node
  become: true
  gather_facts: true
  any_errors_fatal: true
  tasks:
    - name: Configure nvidia production repo
      command: |
        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | sudo gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg \
        && curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
        sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
        sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list

    - name: install linux-headers-{kernet_version}
      command: apt-get install -y linux-headers-$(uname -r) && apt-key del 7fa2af80

    - name: Install network nvidia repo
      wget:
        url: https://developer.download.nvidia.com/compute/cuda/repos/$distro/$arch/cuda-keyring_1.1-1_all.deb
        dest: /etc/apt/preferences.d/cuda-repository-pin-600
        mode: 0644

    - name: Install nvidia container toolkit
      apt-get:
        name: nvidia-container-toolkit
        state: present

    - name: Install nvidia driver
      apt:
        name: nvidia-driver-535
        state: present


